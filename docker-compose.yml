name: nocturne
services:
    lavalink:
        container_name: lavalink
        build:
            context: ./lavalink
            dockerfile: ./Dockerfile-lavalink
        restart: unless-stopped
        environment:
            - _JAVA_OPTIONS=-Xmx1G
            - SERVER_PORT=2333
            - LAVALINK_SERVER_PASSWORD=youshallnotpass
        volumes:
            - ./lavalink/application.yml:/opt/Lavalink/application.yml
            - ./lavalink/plugins:/opt/Lavalink/plugins
            - ./lavalink/logs:/opt/Lavalink/logs
        networks:
            - vocard
        expose:
            - "2333"
        healthcheck:
            test: nc -z -v localhost 2333
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s

    lavalink2:
        container_name: lavalink2
        build:
            context: ./lavalink2
            dockerfile: ../lavalink/Dockerfile-lavalink
        restart: unless-stopped
        environment:
            - _JAVA_OPTIONS=-Xmx1G
            - SERVER_PORT=2333
            - LAVALINK_SERVER_PASSWORD=youshallnotpass
        volumes:
            - ./lavalink2/application.yml:/opt/Lavalink/application.yml
            - ./lavalink2/plugins:/opt/Lavalink/plugins
            - ./lavalink2/logs:/opt/Lavalink/logs
        networks:
            - vocard
        expose:
            - "2333"
        healthcheck:
            test: nc -z -v localhost 2333
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s

    spotify-tokener:
        image: ghcr.io/topi314/spotify-tokener:master
        container_name: spotify-tokener
        restart: unless-stopped
        environment:
            - SPOTIFY_TOKENER_ADDR=0.0.0.0:49152
        networks:
            - vocard
        expose:
            - "49152"
        healthcheck:
            test: nc -z -v localhost 49152
            interval: 10s
            timeout: 5s
            retries: 5

    yt-cipher:
        container_name: yt-cipher
        image: ghcr.io/kikkia/yt-cipher:master
        restart: unless-stopped
        networks:
            - vocard
        expose:
            - "8001"

    vocard-db:
        container_name: vocard-db
        image: mongo:8
        restart: unless-stopped
        volumes:
            - ./data/mongo/db:/data/db
            - ./data/mongo/conf:/data/configdb
        environment:
            - MONGO_INITDB_ROOT_USERNAME=admin
            - MONGO_INITDB_ROOT_PASSWORD=admin
        expose:
            - "27017"
        networks:
            - vocard
        command: ["mongod", "--oplogSize=1024", "--wiredTigerCacheSizeGB=1", "--auth", "--noscripting"]
        healthcheck:
            test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    vocard-dashboard:
        container_name: vocard-dashboard
        build:
            context: ./dashboard
            dockerfile: ./Dockerfile
        restart: unless-stopped
        volumes:
            - ./settings.json:/app/settings.json
        ports:
            - "8080:8080"
        networks:
            - vocard
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    vocard:
        container_name: vocard
        build:
            context: .
            dockerfile: ./Dockerfile
        restart: unless-stopped
        volumes:
            - ./settings.json:/app/settings.json
        environment:
            - BOT_SECTION=nocturne
        networks:
            - vocard
        depends_on:
            lavalink:
                condition: service_healthy
            lavalink2:
                condition: service_healthy
            vocard-db:
                condition: service_healthy
            vocard-dashboard:
                condition: service_healthy

    vocard2:
        container_name: vocard2
        build:
            context: .
            dockerfile: ./Dockerfile
        restart: unless-stopped
        volumes:
            - ./settings.json:/app/settings.json
        environment:
            - BOT_SECTION=nocturne2
        networks:
            - vocard
        depends_on:
            lavalink:
                condition: service_healthy
            lavalink2:
                condition: service_healthy
            vocard-db:
                condition: service_healthy
            vocard-dashboard:
                condition: service_healthy


networks:
    vocard:
        name: vocard
